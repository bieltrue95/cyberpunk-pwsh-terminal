name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostics
        shell: pwsh
        run: .\scripts\check.ps1

      - name: Profile smoke test
        shell: pwsh
        run: .\scripts\test-profile.ps1
