name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostics
        shell: pwsh
        run: .\scripts\check.ps1

      - name: Profile smoke test
        shell: pwsh
        run: .\scripts\test-profile.ps1

      - name: Unit tests (Pester)
        shell: pwsh
        run: .\scripts\test-unit.ps1

      - name: E2E reinstall cycle
        shell: pwsh
        run: .\scripts\test-e2e-reinstall.ps1

      - name: Legal compliance checks
        shell: pwsh
        run: .\scripts\legal-check.ps1
