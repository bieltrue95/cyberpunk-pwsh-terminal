name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.7.1 -Repository PSGallery -Scope CurrentUser -Force -SkipPublisherCheck -AcceptLicense

      - name: Diagnostics
        shell: pwsh
        run: .\scripts\check.ps1

      - name: Profile smoke test
        shell: pwsh
        run: .\scripts\test-profile.ps1

      - name: Unit tests (Pester)
        shell: pwsh
        run: .\scripts\test-unit.ps1

      - name: E2E reinstall cycle
        shell: pwsh
        run: .\scripts\test-e2e-reinstall.ps1

      - name: Legal compliance checks
        shell: pwsh
        run: .\scripts\legal-check.ps1
