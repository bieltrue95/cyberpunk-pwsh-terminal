<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="PowerShell history search showcase">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1280" height="520" fill="#070b14"/>
  <circle cx="160" cy="60" r="240" fill="#00e5ff" opacity="0.12"/>
  <circle cx="1120" cy="0" r="300" fill="#d600ff" opacity="0.15"/>
  <rect x="70" y="56" width="1140" height="408" rx="24" fill="url(#panel)" stroke="#2b3553" stroke-width="2"/>
  <g font-family="Cascadia Mono, Fira Code, Consolas, monospace">
    <text x="110" y="118" fill="#63f3ff" font-size="28" font-weight="700">History search and predictions</text>
    <text x="110" y="166" fill="#b9c7e6" font-size="22">Type a prefix, press Up/Down, jump through matching commands.</text>
    <text x="110" y="228" fill="#63f3ff" font-size="26">dev</text>
    <text x="218" y="228" fill="#f2f6ff" font-size="26">❯ git</text>
    <rect x="112" y="258" width="720" height="158" rx="16" fill="#101827" stroke="#26324f"/>
    <text x="142" y="304" fill="#55a8ff" font-size="22">1  git status --short --branch</text>
    <text x="142" y="342" fill="#67ff9a" font-size="22">2  git add .</text>
    <text x="142" y="380" fill="#ffd166" font-size="22">3  git commit -m "Initial cyberpunk kit"</text>
    <rect x="872" y="258" width="276" height="158" rx="16" fill="#101827" stroke="#d600ff"/>
    <text x="904" y="306" fill="#ff4dff" font-size="21">Ctrl+r</text>
    <text x="1004" y="306" fill="#f2f6ff" font-size="21">reverse</text>
    <text x="904" y="348" fill="#ff4dff" font-size="21">Ctrl+s</text>
    <text x="1004" y="348" fill="#f2f6ff" font-size="21">forward</text>
    <text x="904" y="390" fill="#ff4dff" font-size="21">hist</text>
    <text x="1004" y="390" fill="#f2f6ff" font-size="21">saved log</text>
  </g>
  <rect x="70" y="456" width="1140" height="4" fill="#00e5ff" filter="url(#glow)"/>
</svg>


