<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Emergency restore flow</title>
  <desc id="desc">Cyberpunk styled emergency restore flow showing no profile shell, diagnostics, backups, and restore docs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060914"/>
      <stop offset="0.55" stop-color="#0b1022"/>
      <stop offset="1" stop-color="#101018"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="560" fill="url(#bg)"/>
  <circle cx="1120" cy="88" r="148" fill="#ff2bd6" opacity="0.08"/>
  <circle cx="160" cy="474" r="180" fill="#00e5ff" opacity="0.07"/>
  <text x="72" y="78" fill="#f4f7ff" font-size="40" font-weight="800" font-family="Fira Code, Cascadia Mono, Consolas, monospace">Se deu ruim: modo emergencia</text>
  <text x="74" y="118" fill="#b9c6df" font-size="21" font-family="Fira Code, Cascadia Mono, Consolas, monospace">Abra sem profile, diagnostique, encontre backup e restaure com calma.</text>

  <g font-family="Fira Code, Cascadia Mono, Consolas, monospace">
    <rect x="72" y="172" width="1136" height="70" rx="18" fill="#111827" stroke="#63f3ff" stroke-width="2"/>
    <text x="104" y="216" fill="#63f3ff" font-size="22" font-weight="800">1</text>
    <text x="150" y="216" fill="#eef3ff" font-size="21">pwsh -NoLogo -NoProfile</text>
    <text x="520" y="216" fill="#b9c6df" font-size="17">entra sem carregar configuracao quebrada</text>

    <rect x="72" y="262" width="1136" height="70" rx="18" fill="#111827" stroke="#ffd166" stroke-width="2"/>
    <text x="104" y="306" fill="#ffd166" font-size="22" font-weight="800">2</text>
    <text x="150" y="306" fill="#eef3ff" font-size="21">.\scripts\check.ps1</text>
    <text x="520" y="306" fill="#b9c6df" font-size="17">mostra fonte, oh-my-posh, JSON e parse de scripts</text>

    <rect x="72" y="352" width="1136" height="70" rx="18" fill="#111827" stroke="#ff45d8" stroke-width="2"/>
    <text x="104" y="396" fill="#ff45d8" font-size="22" font-weight="800">3</text>
    <text x="150" y="396" fill="#eef3ff" font-size="21">Get-ChildItem ... -Filter "*.bak-*"</text>
    <text x="680" y="396" fill="#b9c6df" font-size="17">lista backups do profile</text>

    <rect x="72" y="442" width="1136" height="70" rx="18" fill="#111827" stroke="#67ff9a" stroke-width="2"/>
    <text x="104" y="486" fill="#67ff9a" font-size="22" font-weight="800">4</text>
    <text x="150" y="486" fill="#eef3ff" font-size="21">docs\BACKUP_RESTORE.md</text>
    <text x="520" y="486" fill="#b9c6df" font-size="17">comandos prontos para restaurar profile e Terminal</text>
  </g>
</svg>
